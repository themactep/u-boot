# Manually-triggered build of every Ingenic USB-boot loader, one SoC per
# job, using the official thingino prebuilt GCC 15.2 (uClibc) cross
# toolchains - xburst1 for T10-T33, xburst2 for T40/T41/A1 - so the CI
# builds with the exact compiler thingino ships. Each job compiles one
# isvp_*_usbboot defconfig and uploads u-boot-spl.bin + u-boot.bin (flat, no
# spl/ prefix) as a run artifact named after the SoC (defconfig minus the
# _defconfig suffix, e.g. isvp_a1_usbboot). When every SoC build succeeds, a
# final "release" job rolls a single rolling "usbboot" pre-release carrying all
# the loader binaries, SoC-prefixed (<soc>-u-boot-spl.bin / <soc>-u-boot.bin),
# recreated on each manual run.
#
# Security: the only actions used are actions/cache and
# actions/upload-artifact - both first-party to GitHub (the same `actions`
# org as the runner) and pinned to full commit SHAs - because neither the
# Actions cache backend (in-job save+restore) nor run-artifact upload has a
# `gh`/REST equivalent. upload-artifact uses the Actions runtime token, not
# GITHUB_TOKEN, so the job token stays restricted to contents:read.
# Everything else avoids marketplace actions: the source is a plain shallow
# single-branch `git clone` (no tags, no fork upstream), the thingino
# toolchain is fetched with the pre-installed token-authed `gh` CLI (`gh
# release download`), and the build is plain `make`. The build jobs run with
# contents:read; only the final release job is granted contents:write (to
# create the rolling `usbboot` release/tag) and actions:read (so `gh run
# download` can pull this run's artifacts) - both scoped to that one job.
#
# Caching: ccache is restored/saved via actions/cache, keyed per defconfig
# with a rolling key (unique per commit + a prefix restore-key) so each run
# saves a fresh cache and restores the latest. CCACHE_COMPILERCHECK=content
# keeps hits valid even though the toolchain is re-extracted every run.
#
# NOTE: workflow_dispatch only fires for a workflow file present on the
# repo's default branch; pick the branch to build in the "Run workflow"
# dialog (it is cloned via GITHUB_REF_NAME below).

name: usbboot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { defconfig: isvp_t10_usbboot_defconfig,       arch: xburst1 }
          - { defconfig: isvp_t20_usbboot_defconfig,       arch: xburst1 }
          - { defconfig: isvp_t21_usbboot_defconfig,       arch: xburst1 }
          - { defconfig: isvp_t23_usbboot_defconfig,       arch: xburst1 }
          - { defconfig: isvp_t30_usbboot_defconfig,       arch: xburst1 }
          - { defconfig: isvp_t31_usbboot_defconfig,       arch: xburst1 }
          - { defconfig: isvp_t31_usbboot_ddr3_defconfig,  arch: xburst1 }
          - { defconfig: isvp_t32_usbboot_defconfig,       arch: xburst1 }
          - { defconfig: isvp_t33_usbboot_defconfig,       arch: xburst1 }
          - { defconfig: isvp_t40_usbboot_defconfig,       arch: xburst2 }
          - { defconfig: isvp_t40_usbboot_ddr3_defconfig,  arch: xburst2 }
          - { defconfig: isvp_t41_usbboot_defconfig,       arch: xburst2 }
          - { defconfig: isvp_t41_usbboot_ddr3_defconfig,  arch: xburst2 }
          - { defconfig: isvp_a1_usbboot_defconfig,        arch: xburst2 }
    name: ${{ matrix.defconfig }}
    env:
      GH_TOKEN: ${{ github.token }}
      # Both thingino SDKs expose the cross tools under this bare prefix
      # (the binutils are mipsel-linux-ld/ar/...); keep it a bare prefix so
      # ccache can wrap only gcc, not the binutils.
      CROSS_COMPILE: mipsel-linux-
      TOOLCHAIN_TARBALL: thingino-toolchain-x86_64_${{ matrix.arch }}_uclibc_gcc15-linux-mipsel.tar.gz
    steps:
      - name: Install build deps and ccache
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential ccache bison flex \
            libssl-dev libgnutls28-dev uuid-dev \
            swig python3 python3-dev python3-setuptools python3-pyelftools \
            device-tree-compiler xz-utils
          # Wrap the cross gcc (and, best-effort, the host gcc) with ccache
          # via a PATH shim, so CROSS_COMPILE stays a bare prefix and the
          # binutils are not wrapped. content compiler-check so the freshly
          # re-extracted toolchain's mtime does not bust cross-run hits.
          sudo mkdir -p /usr/lib/ccache
          sudo /usr/sbin/update-ccache-symlinks 2>/dev/null || true
          sudo ln -sf "$(command -v ccache)" /usr/lib/ccache/mipsel-linux-gcc
          {
            echo "CCACHE_DIR=$HOME/.ccache"
            echo "CCACHE_MAXSIZE=500M"
            echo "CCACHE_COMPILERCHECK=content"
          } >> "$GITHUB_ENV"

      - name: Restore/save ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.defconfig }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.defconfig }}-

      - name: Fetch thingino ${{ matrix.arch }} toolchain (gh)
        run: |
          gh release download toolchain-x86_64 -R themactep/thingino-firmware \
            --pattern "$TOOLCHAIN_TARBALL" --dir "$RUNNER_TEMP" --clobber
          mkdir -p "$RUNNER_TEMP/toolchain"
          tar -xzf "$RUNNER_TEMP/$TOOLCHAIN_TARBALL" -C "$RUNNER_TEMP/toolchain"
          sdk="$RUNNER_TEMP/toolchain/$(ls -1 "$RUNNER_TEMP/toolchain" | head -1)"
          # Buildroot SDK: rewrite the build-host paths to this location.
          "$sdk/relocate-sdk.sh"
          echo "TOOLCHAIN_BIN=$sdk/bin" >> "$GITHUB_ENV"

      - name: Checkout this branch (shallow, single branch, no actions)
        run: |
          # Plain git clone of ONLY this branch at depth 1, no tags. Avoids
          # `gh repo clone`, which - because this repo is a fork - auto-adds
          # and fetches the u-boot/u-boot "upstream" remote (500+ tags, full
          # history). The repo is public, so no auth is needed here.
          git clone --depth 1 --single-branch --no-tags \
            --branch "$GITHUB_REF_NAME" \
            "https://github.com/$GITHUB_REPOSITORY" .

      - name: Build ${{ matrix.defconfig }}
        run: |
          # ccache shim FIRST, then the toolchain bin, then the system.
          export PATH="/usr/lib/ccache:$TOOLCHAIN_BIN:$PATH"
          mipsel-linux-gcc --version | head -1
          ccache --zero-stats
          make "${{ matrix.defconfig }}"
          make -j"$(nproc)"
          echo "==== usbboot loader binaries ===="
          ls -l spl/u-boot-spl.bin u-boot.bin
          echo "==== ccache statistics ===="
          ccache --show-stats
          # Stage a FLAT artifact dir (u-boot-spl.bin at the root, not under
          # spl/) and derive the artifact name without the _defconfig suffix.
          mkdir -p "$RUNNER_TEMP/artifact"
          cp spl/u-boot-spl.bin u-boot.bin "$RUNNER_TEMP/artifact/"
          defconfig="${{ matrix.defconfig }}"
          echo "ARTIFACT_NAME=${defconfig%_defconfig}" >> "$GITHUB_ENV"

      - name: Upload ${{ matrix.defconfig }} binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifact
          if-no-files-found: error
          retention-days: 30

  # Once every SoC has built, roll a single "usbboot" pre-release carrying all
  # the loader binaries. `gh run download` pulls this run's artifacts (gh has a
  # native equivalent here, so no download-artifact action is needed), then
  # `gh release` recreates the rolling tag. Runs only if all build jobs passed.
  release:
    name: release (usbboot)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the "usbboot" release + tag
      actions: read     # gh run download: read this run's artifacts
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download this run's loader artifacts (gh, no action)
        run: |
          gh run download "$GITHUB_RUN_ID" -R "$GITHUB_REPOSITORY" -D artifacts
          echo "==== downloaded artifacts ===="
          ls -R artifacts

      - name: Stage release assets (SoC-prefixed spl + u-boot per loader)
        run: |
          mkdir -p release
          for d in artifacts/*/; do
            soc="$(basename "$d")"
            for f in "$d"*; do
              cp "$f" "release/${soc}-$(basename "$f")"
            done
          done
          echo "==== release assets ===="
          ls -l release

      - name: Roll the "usbboot" pre-release
        run: |
          notes="Ingenic USB-boot (DFU) loaders for every SoC, built from $GITHUB_REF_NAME @ $GITHUB_SHA. Each <soc>-u-boot-spl.bin plus <soc>-u-boot.bin pair is uploaded to RAM via the mask-ROM USB boot. Rolling release - replaced on every manual run of the usbboot workflow."
          # Drop the previous rolling release + tag (ignored on the first run),
          # then recreate it at the commit that was built.
          gh release delete usbboot -R "$GITHUB_REPOSITORY" --cleanup-tag --yes 2>/dev/null || true
          gh release create usbboot release/* \
            -R "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Ingenic USB-boot loaders (latest)" \
            --notes "$notes" \
            --prerelease

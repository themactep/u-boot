# Manually-triggered build of every Ingenic sfcnor/sfcnand (non-usbboot)
# defconfig, one per job, using the official thingino prebuilt GCC 15.2
# (uClibc) cross toolchains - xburst1 for T10-T33, xburst2 for T40/T41/A1 -
# so the CI builds with the exact compiler thingino ships. Each job uploads
# the single flashable image binman produces, u-boot-with-spl-lzma.bin
# (headered SPL at offset 0 + the LZMA U-Boot), as a run artifact named
# after the SoC (defconfig minus the _defconfig suffix).
#
# Same setup as the usbboot workflow (see usbboot.yml): the only action is
# actions/upload-artifact - first-party to GitHub, pinned by SHA, runtime
# token so the job token stays contents:read. Everything else avoids
# marketplace actions: a shallow single-branch git clone of the source, the
# thingino toolchain fetched with the token-authed gh CLI (gh release
# download), and a plain make. ccache is restored/saved via actions/cache
# (pinned), keyed per defconfig with a rolling key; CCACHE_COMPILERCHECK=
# content keeps hits valid across the re-extracted toolchain.
#
# NOTE: workflow_dispatch only fires for a workflow file present on the
# repo's default branch; pick the branch to build in the "Run workflow"
# dialog (it is cloned via GITHUB_REF_NAME below).

name: build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { defconfig: isvp_t10_sfcnor_defconfig,          arch: xburst1 }
          - { defconfig: isvp_t20_sfcnor_defconfig,          arch: xburst1 }
          - { defconfig: isvp_t20_sfcnor_ddr128M_defconfig,  arch: xburst1 }
          - { defconfig: isvp_t21_sfcnor_defconfig,          arch: xburst1 }
          - { defconfig: isvp_t23_sfcnor_defconfig,          arch: xburst1 }
          - { defconfig: isvp_t30_sfcnor_defconfig,          arch: xburst1 }
          - { defconfig: isvp_t30_sfcnor_ddr128M_defconfig,  arch: xburst1 }
          - { defconfig: isvp_t31_sfcnor_defconfig,          arch: xburst1 }
          - { defconfig: isvp_t31_sfcnor_ddr128M_defconfig,  arch: xburst1 }
          - { defconfig: isvp_t31_sfcnor_lite_defconfig,     arch: xburst1 }
          - { defconfig: isvp_t31a_sfcnor_defconfig,         arch: xburst1 }
          - { defconfig: isvp_t32_sfcnor_defconfig,          arch: xburst1 }
          - { defconfig: isvp_t33_sfcnor_defconfig,          arch: xburst1 }
          - { defconfig: isvp_t40_sfcnor_defconfig,          arch: xburst2 }
          - { defconfig: isvp_t40xp_sfcnand_defconfig,       arch: xburst2 }
          - { defconfig: isvp_t41lq_sfcnor_defconfig,        arch: xburst2 }
          - { defconfig: isvp_t41nq_sfcnor_defconfig,        arch: xburst2 }
          - { defconfig: isvp_a1_sfcnor_defconfig,           arch: xburst2 }
    name: ${{ matrix.defconfig }}
    env:
      GH_TOKEN: ${{ github.token }}
      # Both thingino SDKs expose the cross tools under this bare prefix
      # (the binutils are mipsel-linux-ld/ar/...); keep it a bare prefix so
      # ccache can wrap only gcc, not the binutils.
      CROSS_COMPILE: mipsel-linux-
      TOOLCHAIN_TARBALL: thingino-toolchain-x86_64_${{ matrix.arch }}_uclibc_gcc15-linux-mipsel.tar.gz
    steps:
      - name: Install build deps and ccache
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential ccache bison flex \
            libssl-dev libgnutls28-dev uuid-dev \
            swig python3 python3-dev python3-setuptools python3-pyelftools \
            device-tree-compiler xz-utils
          # Wrap the cross gcc (and, best-effort, the host gcc) with ccache
          # via a PATH shim, so CROSS_COMPILE stays a bare prefix and the
          # binutils are not wrapped. content compiler-check so the freshly
          # re-extracted toolchain's mtime does not bust cross-run hits.
          sudo mkdir -p /usr/lib/ccache
          sudo /usr/sbin/update-ccache-symlinks 2>/dev/null || true
          sudo ln -sf "$(command -v ccache)" /usr/lib/ccache/mipsel-linux-gcc
          {
            echo "CCACHE_DIR=$HOME/.ccache"
            echo "CCACHE_MAXSIZE=500M"
            echo "CCACHE_COMPILERCHECK=content"
          } >> "$GITHUB_ENV"

      - name: Restore/save ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.defconfig }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.defconfig }}-

      - name: Fetch thingino ${{ matrix.arch }} toolchain (gh)
        run: |
          gh release download toolchain-x86_64 -R themactep/thingino-firmware \
            --pattern "$TOOLCHAIN_TARBALL" --dir "$RUNNER_TEMP" --clobber
          mkdir -p "$RUNNER_TEMP/toolchain"
          tar -xzf "$RUNNER_TEMP/$TOOLCHAIN_TARBALL" -C "$RUNNER_TEMP/toolchain"
          sdk="$RUNNER_TEMP/toolchain/$(ls -1 "$RUNNER_TEMP/toolchain" | head -1)"
          # Buildroot SDK: rewrite the build-host paths to this location.
          "$sdk/relocate-sdk.sh"
          echo "TOOLCHAIN_BIN=$sdk/bin" >> "$GITHUB_ENV"

      - name: Checkout this branch (shallow, single branch, no actions)
        run: |
          # Plain git clone of ONLY this branch at depth 1, no tags. Avoids
          # `gh repo clone`, which - because this repo is a fork - auto-adds
          # and fetches the u-boot/u-boot "upstream" remote (500+ tags, full
          # history). The repo is public, so no auth is needed here.
          git clone --depth 1 --single-branch --no-tags \
            --branch "$GITHUB_REF_NAME" \
            "https://github.com/$GITHUB_REPOSITORY" .

      - name: Build ${{ matrix.defconfig }}
        run: |
          # ccache shim FIRST, then the toolchain bin, then the system.
          export PATH="/usr/lib/ccache:$TOOLCHAIN_BIN:$PATH"
          mipsel-linux-gcc --version | head -1
          ccache --zero-stats
          make "${{ matrix.defconfig }}"
          make -j"$(nproc)"
          echo "==== flashable image ===="
          ls -l u-boot-with-spl-lzma.bin
          echo "==== ccache statistics ===="
          ccache --show-stats
          # Stage the single flashable image and derive the artifact name
          # without the _defconfig suffix.
          mkdir -p "$RUNNER_TEMP/artifact"
          cp u-boot-with-spl-lzma.bin "$RUNNER_TEMP/artifact/"
          defconfig="${{ matrix.defconfig }}"
          echo "ARTIFACT_NAME=${defconfig%_defconfig}" >> "$GITHUB_ENV"

      - name: Upload ${{ matrix.defconfig }} image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifact
          if-no-files-found: error
          retention-days: 30

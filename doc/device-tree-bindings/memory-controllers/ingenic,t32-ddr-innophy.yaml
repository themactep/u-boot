%YAML 1.2
---
$id: http://devicetree.org/schemas/memory-controllers/ingenic,t32-ddr-innophy.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Ingenic T32 DDR controller (Synopsys uMCTL2) + Innophy training PHY

maintainers:
  - Alfonso Gamboa <gtxent@gmail.com>

description: |
  The Ingenic T32 (vendor PRJ007) is an XBurst1 SoC but, unlike the legacy
  XBurst1 DDRC of the T21/T23/T30/T31 (ingenic,t31-ddr-innophy.yaml), it pairs
  a Synopsys uMCTL2-class controller with an Innophy training PHY, driven by
  drivers/ram/ingenic/ddr_t32.c under the single compatible
  "ingenic,t32-ddr-innophy".

  As with the other XBurst1 DDR bindings, the per-SKU controller / PHY / timing
  / PLL register block is carried in the devicetree as the
  "ingenic,sdram-params" u32 array (the rk3328 DMC model), not selected by a
  driver-internal variant table. One controller services DDR2, DDR3 and LPDDR3
  SKUs (T32LQ ... T32VNP); the array's first cell selects the type.

  The controller is probed in the SPL to bring up DRAM (the PLL is programmed
  earlier from the same array), so the node is tagged bootph-all.

properties:
  compatible:
    const: ingenic,t32-ddr-innophy

  reg:
    items:
      - description: Synopsys uMCTL2 controller APB aperture
      - description: Innophy PHY APB aperture

  ingenic,sdram-params:
    $ref: /schemas/types.yaml#/definitions/uint32-array
    minItems: 44
    maxItems: 44
    description: |
      The serialized per-SKU DDR-type + size + PLL + uMCTL2 controller +
      Innophy PHY register block, 44 u32 cells in the order consumed by struct
      ingenic_t32_ddr_params (see drivers/ram/ingenic/ddr_t32.h):
      [0] DDR type (0 DDR2, 1 DDR3, 2 LPDDR3), [1] total DRAM bytes,
      [2] DDR CK Hz, [3..6] PLL CPAPCR/CPMPCR/CPCCR-div/CPCCR-sel, [7] MSTR,
      [8..12] INIT0/1/3/4/5, [13..22] DRAMTMG0..8 and DRAMTMG14,
      [23..28] ADDRMAP1..6, [29..31] RFSHCTL3/RFSHTMG/ODTCFG,
      [32..34] DFITMG0/DFITMG1/DFIUPD0, [35..43] Innophy PHY
      channel_en/CWL/CL/AL/tRFC/tREFI/mem_sel/pllpostdiven/pllpostdiv.

required:
  - compatible
  - reg
  - ingenic,sdram-params

additionalProperties: false

examples:
  - |
    memory-controller@13012000 {
            compatible = "ingenic,t32-ddr-innophy";
            reg = <0x13012000 0x1000>,
                  <0x13011000 0x1000>;
            /* T32LQ: DDR2 64 MiB, CK 300 MHz */
            ingenic,sdram-params = <
                    0 0x04000000 300000000
                    0x04b05101 0x06405101 0x557b5510 0x9a7b5510
                    0x00040000
                    0x0001003b 0x00000007 0x01130000 0x00000000 0x00000000
                    0x0a01140e 0x00020312 0x00000408 0x00001000 0x04010405
                    0x01010202 0x00000000 0x00000101 0x00000402 0x00000000
                    0x003f0808 0x00000000 0x00000000 0x00001f1f 0x06060606 0x0f0f0f06
                    0x00000002 0x00490020 0x07020708
                    0x06020002 0x00080307 0x80400003
                    0x00000003 0x00000007 0x00000008 0x00000000
                    0x00000020 0x00000925 0x00000000
                    0x00000001 0x00000001
            >;
            bootph-all;
    };

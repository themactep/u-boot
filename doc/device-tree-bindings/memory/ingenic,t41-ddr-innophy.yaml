%YAML 1.2
---
$id: http://devicetree.org/schemas/memory-controllers/ingenic,t41-ddr-innophy.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Ingenic T41 DDR controller + Innophy DDR PHY

maintainers:
  - Alfonso Gamboa <gtxent@gmail.com>

description: |
  The Ingenic T41 XBurst2 SoC family integrates an Ingenic-internal
  DDR controller paired with the on-die Innophy DDR PHY. A single
  controller IP services DDR2, DDR3, LPDDR2 and LPDDR3 memory chips;
  the per-chip controller / PHY / mode-register values come from the
  vendor `tools/ingenic-tools/ddr_creator_chip/ddr_params_creator`
  host tool for each (SoC variant, chip, frequency, bus-width) tuple.

  The T41 ships in 13 distinct factory SKUs (T41A, T41L, T41LQ, T41N,
  T41NQ, T41XQ, T41ZG, T41ZGC, T41ZL, T41ZM, T41ZMC, T41ZN, T41ZX)
  that differ in clocked frequency, attached chip, drive/ODT trim,
  and skew correction. The SKU is selected by the `ingenic,variant`
  property; the driver looks up the matching register table at probe.

  The controller MMIO base lives at 0xb34f0000. The Innophy PHY
  (offset -0x4df000) and the DDRC APB peripheral region
  (offset -0x4de000) are addressed at fixed offsets relative to the
  controller base.

properties:
  compatible:
    const: ingenic,t41-ddr-innophy

  reg:
    maxItems: 1
    description: |
      Base address and span covering the controller MMIO + PHY +
      APB peripheral regions. Typical value is
      <0xb34f0000 0x3000>.

  ingenic,variant:
    $ref: /schemas/types.yaml#/definitions/string
    description: |
      Selects the per-SKU controller / PHY / mode-register table. Must
      match the silicon-shipped product code (case-sensitive,
      lowercase).
    enum:
      - t41a
      - t41l
      - t41lq
      - t41n
      - t41nq
      - t41xq
      - t41zg
      - t41zgc
      - t41zl
      - t41zm
      - t41zmc
      - t41zn
      - t41zx

required:
  - compatible
  - reg
  - ingenic,variant

additionalProperties: false

examples:
  - |
    memory-controller@b34f0000 {
            compatible = "ingenic,t41-ddr-innophy";
            reg = <0xb34f0000 0x3000>;
            ingenic,variant = "t41nq";
            bootph-all;
    };

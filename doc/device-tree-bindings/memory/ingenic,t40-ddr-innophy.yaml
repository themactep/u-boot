%YAML 1.2
---
$id: http://devicetree.org/schemas/memory-controllers/ingenic,t40-ddr-innophy.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Ingenic T40 DDR controller + Innophy DDR PHY

maintainers:
  - Alfonso Gamboa <gtxent@gmail.com>

description: |
  The Ingenic T40 XBurst2 SoC integrates a DDR controller paired with the
  Innophy DDR PHY, driven - together with the A1 and T41
  (ingenic,a1-ddr-innophy.yaml, ingenic,t41-ddr-innophy.yaml) - by
  drivers/ram/ingenic/ddr_innophy.c under the single compatible
  "ingenic,t40-ddr-innophy".

  The per-SKU controller / PHY / PLL register block is carried in the
  devicetree as the "ingenic,sdram-params" u32 array (the rk3328 DMC model),
  not selected by a driver-internal variant table. The array's first cell
  selects the DDR type and the second the PHY family. T40 ships as T40N (DDR2,
  128 MiB) and T40XP (DDR3, 256 MiB).

  The controller is probed in the SPL to bring up DRAM (the PLL is programmed
  earlier from the same array), so the node is tagged bootph-all.

properties:
  compatible:
    const: ingenic,t40-ddr-innophy

  reg:
    maxItems: 1
    description: |
      DDR controller + Innophy PHY + APB aperture. Typically
      <0xb34f0000 0x3000>.

  ingenic,sdram-params:
    $ref: /schemas/types.yaml#/definitions/uint32-array
    minItems: 60
    maxItems: 60
    description: |
      The serialized per-SKU DDR configuration, 60 u32 cells in the order
      consumed by struct ingenic_ddr_params (see
      drivers/ram/ingenic/ddr_innophy.h): [0] DDR type, [1] PHY family
      (0 T41 / 1 T40 / 2 A1), [2] bus width, [3] chip0 size, [4] chip1 size,
      [5] MPLL Hz, [6] DDR Hz, [7..9] CPAPCR/CPMPCR/CPVPCR M/N/OD,
      [10..15] DDRC cfg/ctrl/dlmr/mmap0/mmap1/refcnt, [16..20] DDRC_TIMING1..5,
      [21..22] autosr cnt/en, [23..24] hregpro/pregpro, [25..26] CGUC0/CGUC1,
      [27..29] PHY memcfg/CL/CWL, [30..35] MR0/MR1/MR2/MR3/MR10/MR63,
      [36..40] DDRC_REMAP1..5 (DDR3 only), [41..59] efuse drive/ODT/skew par[]
      (T41 family only; zero on T40).

required:
  - compatible
  - reg
  - ingenic,sdram-params

additionalProperties: false

examples:
  - |
    memory-controller@b34f0000 {
            compatible = "ingenic,t40-ddr-innophy";
            reg = <0xb34f0000 0x3000>;
            /* T40N: DDR2 128 MiB, 500 MHz */
            ingenic,sdram-params = <
                    0x00000004 0x00000001
                    0x00000020 0x08000000 0x00000000
                    0x3b9aca00 0x1dcd6500
                    0x04c05100 0x07d05900 0x00000000
                    0x28002825 0x00008092 0x00000000 0x000020f8 0x00002800 0x21f20081
                    0x050c0806 0x04060407 0x03080208 0x1e1e1705 0x46000055
                    0x20000f3c 0x00000000 0x00000001 0x00000001
                    0x11111111 0x00000113
                    0x00000011 0x00000007 0x00000005
                    0x00000f73 0x00002040 0x00004000 0x00006000 0x00000000 0x00000000
                    0x00000000 0x00000000 0x00000000 0x00000000 0x00000000
                    0x00000000 0x00000000 0x00000000 0x00000000 0x00000000
                    0x00000000 0x00000000 0x00000000 0x00000000 0x00000000
                    0x00000000 0x00000000 0x00000000 0x00000000 0x00000000
                    0x00000000 0x00000000 0x00000000 0x00000000
            >;
            bootph-all;
    };
